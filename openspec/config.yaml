schema: spec-driven

project: my-site
stack: Vanilla HTML5, Tailwind CSS CDN, semantic markup, print stylesheet

context: |
  Tech stack: Vanilla HTML5, Tailwind CSS CDN (deferred), semantic markup
  Architecture: Single-file HTML at project root, zero JavaScript framework
  Testing: No test runner
  Style: Tailwind CSS CDN with custom color/font config, @media print stylesheet

strict_tdd: false
testing_capabilities:
  runner: none
  unit: false
  integration: false
  e2e: false
  coverage: false
  linter: false
  type_checker: false
  formatter: false

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
