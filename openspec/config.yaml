schema: spec-driven

project: my-site
stack: Vanilla HTML5, Tailwind CSS CDN, inline config, print stylesheet, Cloudflare Pages

context: |
  Single-file static CV site (index.html) with Tailwind CSS via CDN.
  No framework, no build tools, no bundler. Custom Node.js dev server.
  Deployed to Cloudflare Pages (leandrofernandez.dev).
  Fonts: Geist, Hanken Grotesk, JetBrains Mono via CDN.
  E2E tests via custom Playwright runner.

strict_tdd: false
testing_capabilities:
  runner: custom (scripts/test-runner.js)
  runner_command: "npm run test:e2e"
  unit: false
  integration: false
  e2e: true
  e2e_tool: "Playwright (Chromium headless)"
  coverage: false
  linter: false
  type_checker: false
  formatter: false

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    tdd: false
    test_command: "npm run test:e2e"
  verify:
    test_command: "npm run test:e2e"
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
